name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'subgraphs/**'
      - 'scripts/**'
      - 'workspace.toml'
      - '.github/workflows/publish.yml'
  repository_dispatch:
    types: [content-changed]
  workflow_dispatch:

concurrency:
  group: publish
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: cyber
    steps:
      - name: Checkout workspace into ~/cyberia-to/.github
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$HOME/cyberia-to"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" "$HOME/cyberia-to/.github"

      - name: Checkout declared subgraphs
        env:
          GH_TOKEN: ${{ github.token }}
          ORG: cyberia-to
        run: |
          cd "$HOME/cyberia-to/.github"
          for decl in subgraphs/*.md; do
            [ -f "$decl" ] || continue
            NAME=$(awk '/^name:/ {print $2; exit}' "$decl")
            REPO=$(awk '/^repo:/ {print $2; exit}' "$decl")
            ARCHIVED=$(awk '/^archived:/ {print $2; exit}' "$decl")
            ORPHAN=$(awk '/^orphan:/ {print $2; exit}' "$decl")
            VISIBILITY=$(awk '/^visibility:/ {print $2; exit}' "$decl")
            LOCAL_ONLY=$(awk '/^local-only:/ {print $2; exit}' "$decl")

            [ -z "$NAME" ] && continue
            [ -z "$REPO" ] && REPO="$NAME"
            [ "$ARCHIVED" = "true" ] && continue
            [ "$ORPHAN" = "true" ] && continue
            [ "$LOCAL_ONLY" = "true" ] && continue
            [ "$VISIBILITY" = "private" ] && continue

            TARGET="$HOME/cyberia-to/$REPO"
            if [ ! -d "$TARGET" ]; then
              git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${ORG}/${REPO}.git" "$TARGET" \
                || echo "skip ${REPO}: clone failed"
            fi
          done

      - name: Install Nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '*'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache optica build
        uses: actions/cache@v4
        with:
          path: |
            /tmp/optica-target-cache
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-optica-v2
          restore-keys: |
            ${{ runner.os }}-optica-

      - name: Build optica
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf "$HOME/cyberia-to/optica"
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/cyberia-to/optica.git" "$HOME/cyberia-to/optica"
          if [ -d /tmp/optica-target-cache ]; then
            mv /tmp/optica-target-cache "$HOME/cyberia-to/optica/target"
          fi
          cd "$HOME/cyberia-to/optica" && cargo build --release
          cp -r "$HOME/cyberia-to/optica/target" /tmp/optica-target-cache

      - name: Cache IPFS CIDs
        uses: actions/cache@v4
        with:
          path: /tmp/ipfs-cache.json
          key: ipfs-cids-${{ github.run_id }}
          restore-keys: ipfs-cids-

      - name: Resolve IPFS media in root graph
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_GATEWAY: ${{ secrets.PINATA_GATEWAY }}
          GRAPH_ROOT: ${{ github.workspace }}/../cyberia-to/cyber
        run: |
          PUBLIC_GATEWAY="https://gateway.pinata.cloud"
          GATEWAY="${PINATA_GATEWAY:-$PUBLIC_GATEWAY}"
          CACHE_FILE="/tmp/ipfs-cache.json"
          [ -f "$CACHE_FILE" ] || echo '{}' > "$CACHE_FILE"

          ROOT_GRAPH="$HOME/cyberia-to/cyber"
          [ -d "$ROOT_GRAPH/root" ] || { echo "no root/ in $ROOT_GRAPH, skipping media resolve"; exit 0; }

          FILENAMES=$(grep -roh '\.\./media/[^)"'"'"' ]*' "$ROOT_GRAPH/root" | sed 's|\.\./media/||' | sort -u || true)
          [ -z "$FILENAMES" ] && { echo "no media references"; exit 0; }

          SED_SCRIPT=""
          while IFS= read -r filename; do
            [ -z "$filename" ] && continue
            CID=$(jq -r --arg f "$filename" '.[$f] // empty' "$CACHE_FILE")
            if [ -z "$CID" ] && [ -n "$PINATA_JWT" ] && [ -f "$ROOT_GRAPH/media/$filename" ]; then
              RESP=$(curl -s -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
                -H "Authorization: Bearer ${PINATA_JWT}" \
                -F "file=@$ROOT_GRAPH/media/${filename}")
              CID=$(echo "$RESP" | jq -r '.IpfsHash // empty')
              [ -n "$CID" ] && jq --arg f "$filename" --arg c "$CID" '. + {($f): $c}' "$CACHE_FILE" > /tmp/tmp.json && mv /tmp/tmp.json "$CACHE_FILE"
            fi
            [ -z "$CID" ] && continue
            SED_SCRIPT="${SED_SCRIPT}s|\.\./media/${filename}|${GATEWAY}/ipfs/${CID}|g;"
          done <<< "$FILENAMES"

          if [ -n "$SED_SCRIPT" ]; then
            find "$ROOT_GRAPH/root" -name '*.md' -exec sed -i "$SED_SCRIPT" {} +
            echo "Rewrote media URLs using $GATEWAY"
          fi

      - name: Build site
        run: |
          cd "$HOME/cyberia-to/.github"
          nu scripts/build.nu --public-only \
            --optica "$HOME/cyberia-to/optica/target/release/optica" \
            --output "$HOME/cyberia-to/.github/build"

      - name: Add deploy files
        run: touch "$HOME/cyberia-to/.github/build/.nojekyll"

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod \
            --dir="$HOME/cyberia-to/.github/build" \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN"
